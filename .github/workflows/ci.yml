name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  pr-title:
    name: PR title
    if: ${{ !startsWith(github.head_ref, 'release-plz-') }}
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          CONVENTIONAL_COMMIT_REGEX: '^(feat|fix|refactor|test|docs|chore|ci|perf|build)(\(.+\))?!?: [a-z].*'
        run: |
          if ! echo "$PR_TITLE" | grep -qE "$CONVENTIONAL_COMMIT_REGEX"; then
            echo "PR title: $PR_TITLE"
            echo ""
            echo "PR title must follow Conventional Commits: <type>: <description>"
            echo "Types: feat, fix, refactor, test, docs, chore, ci, perf, build"
            exit 1
          fi
          LEN=$(echo -n "$PR_TITLE" | wc -c | tr -d ' ')
          if [ "$LEN" -gt 72 ]; then
            echo "PR title is $LEN chars (max 72)"
            exit 1
          fi

  format:
    name: Format
    if: ${{ !startsWith(github.head_ref, 'release-plz-') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: ./.github/actions/setup-rust
        with:
          just: 'true'
          cache: 'false'
      - run: just format-check

  clippy:
    name: Clippy
    if: ${{ !startsWith(github.head_ref, 'release-plz-') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: ./.github/actions/setup-rust
        with:
          just: 'true'
      - run: just lint

  golangci-lint:
    name: Golangci-lint
    if: ${{ !startsWith(github.head_ref, 'release-plz-') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # ratchet:actions/setup-go@v6
        with:
          go-version-file: go-version
          cache: true
          cache-dependency-path: '**/go.sum'
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # ratchet:actions/cache@v4
        id: cache-golangci-lint
        with:
          path: ~/go/bin/golangci-lint
          key: golangci-lint-v2.12.1-${{ runner.os }}
      - if: steps.cache-golangci-lint.outputs.cache-hit != 'true'
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.1
      - run: cd bindgen && golangci-lint run
      - run: cd prelude && golangci-lint run

  test:
    name: Test
    if: ${{ !startsWith(github.head_ref, 'release-plz-') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: ./.github/actions/setup-rust
        with:
          go: 'true'
      - run: cargo test -p tests --test suite --locked -- --format terse
      - run: cargo test --workspace --lib --bins --locked -- --format terse

  lsp-test:
    name: LSP tests
    if: ${{ !startsWith(github.head_ref, 'release-plz-') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: ./.github/actions/setup-rust
      - run: cargo test -p lisette-lsp --test lsp --locked -- --format terse

  e2e-smoke:
    name: E2E smoke
    if: ${{ !startsWith(github.head_ref, 'release-plz-') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: ./.github/actions/setup-rust
        with:
          go: 'true'
      - run: cargo build -p lisette --locked
      - run: cargo test -p tests --test e2e_smoke --locked -- --format terse
      - run: cargo test -p tests --test e2e_learn --locked -- --format terse
      - run: cargo test -p tests --test e2e_run --locked -- --format terse

  stdlib-check:
    name: Stdlib check
    if: ${{ !startsWith(github.head_ref, 'release-plz-') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: ./.github/actions/setup-rust
        with:
          just: 'true'
          go: 'true'
      - run: just check-stdlib-drift

  tree-sitter-check:
    name: Tree-sitter check
    if: ${{ !startsWith(github.head_ref, 'release-plz-') }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: editors/tree-sitter-lisette
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # ratchet:actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: editors/tree-sitter-lisette/package-lock.json
      - run: npm ci
      - name: Check parser-grammar sync
        run: |
          npx tree-sitter generate
          if ! git diff --exit-code src/; then
            echo "::error::tree-sitter generated artifacts are out of sync with grammar.js"
            echo "Run 'npx tree-sitter generate' in editors/tree-sitter-lisette and commit src/."
            exit 1
          fi
      - run: npx tree-sitter test

  ide-extension-version-check:
    name: IDE extension version check
    if: ${{ !startsWith(github.head_ref, 'release-plz-') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Require IDE extension version bump on grammar change
        env:
          BASE: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          git fetch --depth=1 origin "$BASE"
          BASE_REF="origin/$BASE"
          fail=0

          ts_paths=(
            editors/tree-sitter-lisette/grammar.js
            editors/tree-sitter-lisette/src
            editors/tree-sitter-lisette/queries
          )

          if git diff --name-only "$BASE_REF..HEAD" -- "${ts_paths[@]}" | grep -q .; then
            curr=$(grep -m1 -E '^version[[:space:]]*=' editors/zed/extension.toml | sed -E 's/.*"([^"]+)".*/\1/')
            prev=$(git show "$BASE_REF:editors/zed/extension.toml" | grep -m1 -E '^version[[:space:]]*=' | sed -E 's/.*"([^"]+)".*/\1/')
            if [ "$curr" = "$prev" ]; then
              echo "::error::tree-sitter grammar changed but editors/zed/extension.toml version was not bumped (still $curr)"
              fail=1
            fi
          fi

          if git diff --name-only "$BASE_REF..HEAD" -- editors/vscode/syntaxes/lisette.tmLanguage.json | grep -q .; then
            curr=$(jq -r .version editors/vscode/package.json)
            prev=$(git show "$BASE_REF:editors/vscode/package.json" | jq -r .version)
            if [ "$curr" = "$prev" ]; then
              echo "::error::editors/vscode/syntaxes/lisette.tmLanguage.json changed but editors/vscode/package.json version was not bumped (still $curr)"
              fail=1
            fi
          fi

          exit $fail

  e2e-suite:
    name: E2E suite
    if: ${{ !startsWith(github.head_ref, 'release-plz-') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: ./.github/actions/setup-rust
        with:
          just: 'true'
          go: 'true'
      - run: just test-e2e-suite

  embed-diff:
    name: Embed differential
    if: ${{ !startsWith(github.head_ref, 'release-plz-') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: ./.github/actions/setup-rust
        with:
          just: 'true'
          go: 'true'
      - run: just test-embed-diff

  prelude-go:
    name: Prelude tests
    if: ${{ !startsWith(github.head_ref, 'release-plz-') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # ratchet:actions/setup-go@v6
        with:
          go-version-file: go-version
          cache: true
          cache-dependency-path: '**/go.sum'
      - run: cd prelude && go test ./...

  shear:
    name: Shear
    if: ${{ !startsWith(github.head_ref, 'release-plz-') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: ./.github/actions/setup-rust
        with:
          cache: 'false'
      - uses: taiki-e/install-action@1329c298aa20c3257846c9b2e0e55967df3e3c37 # ratchet:taiki-e/install-action@v2
        with:
          tool: cargo-shear@1.6.0
      - run: cargo shear

  deny:
    name: Deny
    if: ${{ !startsWith(github.head_ref, 'release-plz-') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: ./.github/actions/setup-rust
        with:
          cache: 'false'
      - uses: taiki-e/install-action@1329c298aa20c3257846c9b2e0e55967df3e3c37 # ratchet:taiki-e/install-action@v2
        with:
          tool: cargo-deny@0.19.0
      - run: cargo deny check
