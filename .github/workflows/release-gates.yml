name: Release PR gates

on:
  pull_request:
    branches: [main]

concurrency:
  group: release-gates-${{ github.head_ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  emit-runtime-gate:
    name: Emit runtime suite
    if: ${{ startsWith(github.event.pull_request.head.ref, 'release-plz-') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6

      - name: Install Rust toolchain
        run: rustup show

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # ratchet:actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: false

      - uses: extractions/setup-just@f8a3cce218d9f83db3a2ecd90e41ac3de6cdfd9b # ratchet:extractions/setup-just@v3

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # ratchet:Swatinem/rust-cache@v2

      - name: Run emit runtime suite
        run: just test-emit-runtime

  windows-build-gate:
    name: Windows build
    if: ${{ startsWith(github.event.pull_request.head.ref, 'release-plz-') }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6

      - name: Install Rust toolchain
        run: rustup show

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # ratchet:Swatinem/rust-cache@v2

      - name: Build lisette
        run: cargo build -p lisette

  packaging-gate:
    name: Packaging dry-run
    if: ${{ startsWith(github.event.pull_request.head.ref, 'release-plz-') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6

      - name: Install Rust toolchain
        run: rustup show

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # ratchet:Swatinem/rust-cache@v2

      - name: Cargo publish dry-run
        run: cargo publish --workspace --dry-run

  changelog-tripwire:
    name: Changelog completeness
    if: ${{ startsWith(github.event.pull_request.head.ref, 'release-plz-') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify all commits since last tag are in CHANGELOG.md
        run: |
          set -euo pipefail
          PREV=$(git describe --tags --abbrev=0 --match 'lisette-v*' origin/main 2>/dev/null \
                 || git rev-list --max-parents=0 origin/main | head -1)
          MISSING=()
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            SHA="${line%% *}"
            SUBJ="${line#* }"
            case "$SUBJ" in
              "chore: bump stdlib typedefs"*) continue ;;
              "chore: release"*) continue ;;
            esac
            if ! grep -q "${SHA:0:7}" CHANGELOG.md; then
              MISSING+=("$SHA $SUBJ")
            fi
          done < <(git log --no-merges --format='%H %s' "${PREV}..origin/main")

          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "Commits missing from CHANGELOG.md:"
            for entry in "${MISSING[@]}"; do
              echo "  $entry"
            done
            echo "::error::${#MISSING[@]} commit(s) missing from CHANGELOG.md (see job log)"
            exit 1
          fi
          echo "All commits since ${PREV} are present in CHANGELOG.md."
